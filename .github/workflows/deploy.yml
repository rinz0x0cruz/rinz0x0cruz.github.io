name: Portfolio CI and Deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Experience is calculated at month granularity, so one refresh per month is sufficient.
    - cron: '0 6 1 * *'

permissions:
  contents: read

concurrency:
  group: portfolio-${{ github.event.pull_request.number || 'deployment' }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Set build metadata
        shell: bash
        run: echo "BUILD_DATE=$(date -u +%F)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Validate source contracts
        env:
          STRICT_FRESHNESS: ${{ github.event_name == 'schedule' }}
        run: npm run validate

      - name: Build static site
        env:
          PUBLIC_ANALYTICS_ENDPOINT: ${{ vars.PUBLIC_ANALYTICS_ENDPOINT }}
          PUBLIC_ANALYTICS_ENGAGEMENT: ${{ vars.PUBLIC_ANALYTICS_ENGAGEMENT }}
        run: npm run build

      - name: Verify build artifact
        run: npm run verify:build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Test browser behavior and accessibility
        run: npm run test:e2e

      - name: Run advisory Lighthouse medians
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: npm run test:lighthouse

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build fixed visual fixture
        env:
          BUILD_DATE: '2026-07-16'
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Compare reviewed baselines
        run: npm run test:visual

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    needs: [validate, visual]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  smoke:
    name: Verify live deployment
    if: github.event_name != 'pull_request'
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout smoke test
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version

      - name: Verify deployed commit and endpoints
        env:
          DEPLOY_URL: ${{ needs.deploy.outputs.page_url }}
          EXPECTED_SHA: ${{ github.sha }}
        run: node scripts/smoke-deploy.mjs
