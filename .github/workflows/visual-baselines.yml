name: Generate visual baselines

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: Ubuntu Chromium candidates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build deterministic site
        env:
          BUILD_DATE: '2026-07-16'
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate candidate baselines
        run: npm run test:visual -- --update-snapshots

      - name: Upload candidate baselines
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-baselines-${{ github.sha }}
          path: e2e/visual.spec.ts-snapshots/
          if-no-files-found: error
          retention-days: 14